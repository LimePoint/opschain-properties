name: OpsChain Context
description: Setup OpsChain Properties Context within a GitHub Action Workflow
author: 'LimePoint Pty Ltd'
branding:
  icon: 'share-2'
  color: 'green'
inputs:
  project:
    type: string
    description: 'Project Code'
    required: true
  environment:
    type: string
    description: 'Environment Code (informational; not used in URL construction)'
    required: false
  asset:
    type: string
    description: 'Asset Code'
    required: true
  change_id:
    type: string
    description: 'OpsChain Change ID Reference'
    required: false
  commit_sha:
    type: string
    description: 'OpsChain Git Commit SHA'
    required: false
outputs:
  context:
    description: 'JSON-stringified change object (empty string when change_id is not provided)'
  config:
    description: 'JSON-stringified converged config (with the opschain key removed)'
  env:
    description: 'JSON-stringified env map (with GITHUB_* keys removed)'
runs:
  using: 'node20'
  main: 'dist/index.js'
